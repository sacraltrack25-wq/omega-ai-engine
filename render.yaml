services:
  - type: web
    runtime: docker
    name: omega-ai-engine
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_ENGINE_API_KEY
        sync: false
