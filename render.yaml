services:
  - type: web
    runtime: docker
    name: omega-unified
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_ENGINE_API_KEY
        sync: false
      - key: ENCODER_SERVICE_URL
        value: http://localhost:8000/encoder
      - key: HF_TOKEN
        sync: false
